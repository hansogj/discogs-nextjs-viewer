name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs when a new commit is pushed to the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Stub values for env vars that lib/discogs.ts reads at import time —
    # the module throws on import if these aren't set, which would block
    # tsc and vitest from even loading the file. Real values aren't needed
    # because we don't make any Discogs API calls during typecheck or unit
    # tests.
    env:
      DISCOGS_CONSUMER_KEY: ci-stub
      DISCOGS_CONSUMER_SECRET: ci-stub
      DISCOGS_CALLBACK_URL: http://localhost:3000/api/oauth/callback
      AUTH_SECRET: ci-stub-auth-secret-at-least-32-characters-long
      REDIS_URL: redis://localhost:6379
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm tsc --noEmit

      # Lint intentionally omitted: `next lint` (the current package script)
      # was removed in Next.js 16. Re-enable once .eslintrc.* is migrated
      # to a flat config and the script points at eslint directly.

      - name: Unit tests
        run: pnpm test --run
