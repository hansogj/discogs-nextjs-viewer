services:
  # Redis cache and queue service
  cache:
    image: redis:7.4-alpine
    restart: always
    ports:
      - "6379:6379"
    env_file:
      - ../.env.local
    command: sh -c "redis-server --save 20 1 --loglevel warning --requirepass $$REDIS_PASSWORD"
    volumes:
      - cache:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Next.js web application
  web:
    build:
      context: .. # Dockerfile is in the parent directory
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env.local
    environment:
      NODE_ENV: development
    volumes:
      - discogs-data:/app/.next/cache/discogs-data
    command: pnpm dev
    depends_on:
      cache:
        condition: service_healthy # Wait for Redis to be healthy

  # BullMQ worker for background tasks
  worker:
    build:
      context: .. # Dockerfile is in the parent directory
      dockerfile: Dockerfile
    env_file:
      - ../.env.local
    environment:
      NODE_ENV: development
    volumes:
      - discogs-data:/app/.next/cache/discogs-data
    command: pnpm dev:worker
    depends_on:
      cache:
        condition: service_healthy # Wait for Redis to be healthy

volumes:
  cache:
    driver: local
  discogs-data:
    driver: local
